server:
  port: 8082

spring:
  application:
    name: relay-service-1
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/meshpay_relay_1?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:rootpassword}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

services:
  next-node:
    url: ${NEXT_NODE_URL:http://localhost:8083}
  transaction-service:
    url: ${TRANSACTION_SERVICE_URL:http://localhost:8086}

