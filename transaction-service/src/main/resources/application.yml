server:
  port: 8086

spring:
  application:
    name: transaction-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/meshpay_transaction?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:rootpassword}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

services:
  user-service:
    url: ${USER_SERVICE_URL:http://localhost:8081}
  bank-service:
    url: ${BANK_SERVICE_URL:http://localhost:8085}
  next-node:
    url: ${NEXT_NODE_URL:http://localhost:8082}
