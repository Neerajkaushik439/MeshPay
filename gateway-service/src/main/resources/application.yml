server:
  port: 8084

spring:
  application:
    name: gateway-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/meshpay_gateway?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:rootpassword}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

services:
  bank-service:
    url: ${BANK_SERVICE_URL:http://localhost:8085}
  transaction-service:
    url: ${TRANSACTION_SERVICE_URL:http://localhost:8086}

